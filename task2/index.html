<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Component</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <article class="card">
      <img
        class="card__image"
        src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=250&fit=crop"
        alt="Mountain landscape at sunset"
      />
      <div class="card__body">
        <h2 class="card__title">Mountain Escape</h2>
        <p class="card__description">
          Discover breathtaking peaks and serene valleys on this curated
          highland retreat. Perfect for hikers and nature lovers seeking
          tranquility away from the city.
        </p>
        <a href="#" class="card__btn">Explore</a>
      </div>
    </article>
  </main>
</body>
</html>
