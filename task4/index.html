<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pure CSS Dropdown Menu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="brand">MyBrand</div>

    <!-- Mobile toggle (checkbox hack) -->
    <input type="checkbox" id="nav-toggle" class="nav-toggle" />
    <label for="nav-toggle" class="nav-toggle-label">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <nav class="nav">
      <ul class="nav__list">
        <li class="nav__item"><a href="#" class="nav__link">Home</a></li>

        <li class="nav__item nav__item--dropdown">
          <a href="#" class="nav__link">Services <span class="arrow">&#9660;</span></a>
          <ul class="dropdown">
            <li><a href="#" class="dropdown__link">Web Design</a></li>
            <li><a href="#" class="dropdown__link">Development</a></li>
            <li><a href="#" class="dropdown__link">SEO &amp; Marketing</a></li>
            <li><a href="#" class="dropdown__link">Consulting</a></li>
          </ul>
        </li>

        <li class="nav__item nav__item--dropdown">
          <a href="#" class="nav__link">Products <span class="arrow">&#9660;</span></a>
          <ul class="dropdown">
            <li><a href="#" class="dropdown__link">Mobile Apps</a></li>
            <li><a href="#" class="dropdown__link">Desktop Tools</a></li>
            <li><a href="#" class="dropdown__link">Cloud Solutions</a></li>
          </ul>
        </li>

        <li class="nav__item"><a href="#" class="nav__link">Portfolio</a></li>
        <li class="nav__item"><a href="#" class="nav__link">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="hero">
    <h1>Pure CSS Dropdown Menu</h1>
    <p>Hover over <strong>Services</strong> or <strong>Products</strong> to see the dropdown.</p>
  </main>

</body>
</html>
